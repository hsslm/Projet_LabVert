<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LabVert - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Slab:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <h2 id="plantTitle"></h2>

  <div class="sensor-card">
    <div class="sensor-label">Température</div>
    <div class="sensor-value" id="tempVal">22<span class="sensor-unit">°C</span></div>
  </div>

  <div class="sensor-card">
    <div class="sensor-label">Humidité du sol</div>
    <div class="sensor-value" id="humVal">68<span class="sensor-unit">%</span></div>
  </div>

  <div class="arrosage-card">
    <div class="sensor-label">Arrosage</div>
    <div class="toggle-row">
      <span class="toggle-label">Mode automatique</span>
      <label class="toggle">
        <input type="checkbox" id="toggleAuto" onchange="toggleMode(this)">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Mode manuel</span>
      <label class="toggle">
        <input type="checkbox" id="togglePompe">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="stats-card">
    <div class="sensor-label">Statistiques</div>
    <div class="stat-row" id="statTemp" onclick="ouvrirModal('Température', '--', '--', '--', '--')">
      <span class="stat-name">Température</span>
      <span class="stat-arrow">›</span>
    </div>
    <div class="stat-row" id="statHum" onclick="ouvrirModal('Humidité', '--', '--', '--', '--')">
      <span class="stat-name">Humidité</span>
      <span class="stat-arrow">›</span>
    </div>
  </div>

  <div class="chart-card">
    <canvas id="monGraphique"></canvas>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="fermerModal(event)">
    <div class="modal">
      <h2 id="modalTitre">Statistiques</h2>
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="modal-stat-label">Médiane</div>
          <div class="modal-stat-val" id="modalMediane">-</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">Moyenne</div>
          <div class="modal-stat-val" id="modalMoyenne">-</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">Minimum</div>
          <div class="modal-stat-val" id="modalMin">-</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">Maximum</div>
          <div class="modal-stat-val" id="modalMax">-</div>
        </div>
      </div>
      <canvas id="modalGraphique" height="100"></canvas>
      <br><br>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">
        Fermer
      </button>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
