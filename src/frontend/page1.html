<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LabVert</title>
  <link rel="stylesheet" href="page1.css">
</head>

<body>

<div class="card">
  <h1>LabVert</h1>

  <form id="plantForm">
    <!-- Menu déroulant -->
    <label for="plantName">Choisissez votre plante :</label>
    <select id="plantName" required>
      <option value="">Chargement des plantes...</option>
    </select>

    <!-- Type de plante -->
    <label for="plantType">Ajouter un surnom de plante :</label>
    <input type="text" id="plantType" placeholder="Ex : Fleur, Plante verte..." required>

    <button type="submit" class="btn">Continuer</button>
  </form>
</div>

<script>
const apiKey = "sk-ZnU069c6c20d90c8d15861";
const plantSelect = document.getElementById("plantName");
const plantForm = document.getElementById("plantForm");

// Charger les plantes depuis l'API
async function chargerPlantes() {
  try {
    const response = await fetch(`https://perenual.com/api/v2/species-list?key=${apiKey}`);
    const data = await response.json();

    plantSelect.innerHTML = '<option value="">Choisissez une plante</option>';

    data.data.slice(0, 30).forEach(plante => {
      if (plante.common_name) {
        const option = document.createElement("option");
        option.value = plante.common_name;
        option.textContent = plante.common_name;
        plantSelect.appendChild(option);
      }
    });
  } catch (err) {
    console.error("Erreur API:", err);
    plantSelect.innerHTML = '<option value="">Impossible de charger les plantes</option>';
    alert("Impossible de charger les plantes pour le moment. Réessayez plus tard.");
  }
}

// Gestion du formulaire
plantForm.addEventListener("submit", (e) => {
  e.preventDefault();

  const nom = plantSelect.value.trim();
  const type = document.getElementById("plantType").value.trim();

  if (!nom || !type) {
    alert("Remplis tous les champs !");
    return;
  }

  localStorage.setItem("planteNom", nom);
  localStorage.setItem("planteType", type);

  // Redirection vers le dashboard
  window.location.href = "index.html";
});

// Lancer le chargement des plantes au démarrage
chargerPlantes();
</script>

</body>
</html>
