<!DOCTYPE html><!--fait-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LabVert</title>
  <link rel="stylesheet" href="setup.css">
</head>

<body>

<div class="card">
  <h1>LabVert</h1>

  <form id="plantForm">

    <label for="plantInput">Votre plante :</label>
<!--Case pr le nom de la plante-->
    <div class="input-wrapper">
      <input type="text" id="plantInput" placeholder="Ex : Monstera, Lavande..." autocomplete="off" required><!--désactive les suggestions du navigateur-->
      <div id="suggestions"></div>
    </div>
<!--Case pr le surnom-->
    <label for="plantType">Surnom de la plante :</label>
    <input type="text" id="plantType" placeholder="Ex : Fleur, Bébé plante..." required>

    <button type="submit" class="btn">Continuer</button>
  </form>
</div>

<script>
// API URL - utilise l'API déployée sur Render 
const API_URL = "https://projet-labvert.onrender.com";

let plantes = [];//Liste des plantes
const plantInput = document.getElementById("plantInput");
const suggestionsBox = document.getElementById("suggestions");

// Fonction pour charger les plantes
async function chargerPlantes() {// async= en attente de la réponse
  try {
    const response = await fetch(`${API_URL}/plantes`);
    plantes = await response.json();
  } catch (err) {
    console.error("Erreur:", err);
  }
}
chargerPlantes();

// Suggestions dynamiques
plantInput.addEventListener("input", () => { // Écoute chaque fois que l'utilisateur tape une lettre dans le champ
  const query = plantInput.value.toLowerCase();
  suggestionsBox.innerHTML = "";

  if (!query) {
    suggestionsBox.style.display = "none";
    return;
  }

  const filtres = plantes.filter(p => p.toLowerCase().includes(query));// filtre la liste de plantes

  if (filtres.length === 0) {
    suggestionsBox.style.display = "none";
    return;
  }

  filtres.forEach(p => {
    // Crée une boîte HTML pour chaque plante trouvée
    const div = document.createElement("div");
    div.textContent = p; // Met le nom de la plante dans la boîte
    div.onclick = () => {
      plantInput.value = p;
      suggestionsBox.style.display = "none";
    };
    // Ajoute la boîte dans la liste de suggestions
    suggestionsBox.appendChild(div);
  });

  suggestionsBox.style.display = "block";
});

// Soumission
document.getElementById("plantForm").addEventListener("submit", (e) => {
  e.preventDefault();//Empêche le comportement par défaut d'un formulaire HTML

  const nom = plantInput.value.trim();
  const type = document.getElementById("plantType").value.trim();

  if (!nom || !type) {
    alert("Remplis tous les champs !");
    return;
  }
//Récupération des données pr le dashboard.html
  localStorage.setItem("planteNom", nom);
  localStorage.setItem("planteType", type);

  // Redirection vers le dashboard
  window.location.href = "dashboard.html";
});
</script>

</body>
</html>
